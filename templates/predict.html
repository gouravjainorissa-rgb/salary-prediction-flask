<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Salary Prediction</h1>

    <p class="subtitle">
        Enter your details to estimate your monthly salary.
    </p>

    <form action="/predict" method="GET">

        <label>Full Name</label>
        <input
            type="text"
            name="name"
            placeholder="Enter your full name"
            required>

        <label>Age</label>
        <input
            type="number"
            name="age"
            placeholder="Enter your age"
            min="18"
            max="100"
            required>

        <label>Education</label>
        <input
            type="text"
            name="education"
            placeholder="Enter your education"
            required>

        <label>Years of Experience</label>
        <input
            type="number"
            name="experience"
            placeholder="Enter years of experience"
            min="0"
            max="50"
            required>

        <button type="submit">
            Predict Salary
        </button>

    </form>

    {% if salary %}

    <div class="result-card">

        <h2>Salary Prediction Result</h2>

        <p><strong>👤 Name:</strong> {{ name }}</p>

        <p><strong>🎂 Age:</strong> {{ age }} Years</p>

        <p><strong>🎓 Education:</strong> {{ education }}</p>

        <p><strong>💼 Experience:</strong> {{ experience }} Years</p>

        <hr>

        <p style="text-align:center; font-size:18px; margin-top:15px;">
            Estimated Monthly Salary
        </p>

        <div class="salary">
            ₹ {{ "{:,.0f}".format(salary) }}
        </div>

        <br>

        <a href="/download-pdf?name={{ name }}&age={{ age }}&education={{ education }}&experience={{ experience }}&salary={{ salary }}">

            <button type="button">

                📄 Download PDF Report

            </button>

        </a>

    </div>

    {% endif %}

</div>

</body>

</html>
